name: Astra CI

on:
  push:
    branches:
      - main
      - "astra/**"
  pull_request:
    branches:
      - main
      - "astra/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/astra_arch_setup_6
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: astra_arch_setup_6
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Apply todo schema
        run: npm run db:migrate

      - name: Run CI quality gates
        env:
          CI_SKIP_INSTALL: '1'
        run: node scripts/ci-gates.mjs
