services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astra_arch_setup_6
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  todo-app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/astra_arch_setup_6
      PORT: 4173
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4173:4173"
